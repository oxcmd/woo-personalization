name: Bug report
description: Report a defect in Woo Personalization
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please search [existing issues](https://github.com/oxcmd/woo-personalization/issues) first.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to product page
        2. Upload image
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: e.g. 1.3.0
    validations:
      required: true

  - type: input
    id: wp-version
    attributes:
      label: WordPress version
    validations:
      required: true

  - type: input
    id: wc-version
    attributes:
      label: WooCommerce version
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version

  - type: checkboxes
    id: hpos
    attributes:
      label: Environment
      options:
        - label: HPOS (High-Performance Order Storage) is enabled
        - label: I can reproduce on a fresh WordPress install
