name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem and proposed solution. See [ROADMAP.md](../ROADMAP.md) for planned work.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Storefront / product page
        - Cart / checkout
        - Orders / admin
        - Email
        - Settings / operations
        - Other
